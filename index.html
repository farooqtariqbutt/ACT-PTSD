
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACT & PTSD Coach SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&family=Permanent+Marker&family=Space+Mono:wght@400;700&display=swap');
      :root {
        --primary-indigo: #4f46e5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        -webkit-font-smoothing: antialiased;
      }
      /* WCAG 2.1 High Contrast Mode Simulation */
      .high-contrast {
        background-color: #000 !important;
        color: #fff !important;
      }
      .high-contrast button, .high-contrast a {
        border: 2px solid #fff !important;
        background-color: transparent !important;
        color: #fff !important;
      }
      .high-contrast .bg-white, .high-contrast .bg-slate-50 {
        background-color: #111 !important;
        border-color: #fff !important;
      }
      /* Screen Reader Only */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      /* Brain Loader Animation */
      @keyframes brain-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .brain-loading-img {
        animation: brain-rotate 3s linear infinite;
        display: inline-block;
        vertical-align: middle;
      }

      /* Music Bar Animation */
      @keyframes music-bar-1 {
        0%, 100% { height: 40%; }
        50% { height: 100%; }
      }
      @keyframes music-bar-2 {
        0%, 100% { height: 60%; }
        50% { height: 30%; }
      }
      @keyframes music-bar-3 {
        0%, 100% { height: 30%; }
        50% { height: 80%; }
      }
      .animate-music-bar-1 { animation: music-bar-1 0.8s ease-in-out infinite; }
      .animate-music-bar-2 { animation: music-bar-2 0.8s ease-in-out infinite; }
      .animate-music-bar-3 { animation: music-bar-3 0.8s ease-in-out infinite; }

      /* Visual Defusion Animations */
      @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); }
        50% { transform: translateY(-10px) translateX(5px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }

      @keyframes stream-line {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-stream-line { animation: stream-line 3s linear infinite; }

      @keyframes leaf-float {
        0%, 100% { transform: rotate(0deg) translateY(0); }
        25% { transform: rotate(5deg) translateY(5px); }
        75% { transform: rotate(-5deg) translateY(-5px); }
      }
      .animate-leaf-float { animation: leaf-float 6s ease-in-out infinite; }

      @keyframes radar-sweep {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-radar-sweep { animation: radar-sweep 4s linear infinite; }

      @keyframes candle-flicker {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
        50% { transform: scale(1.1) rotate(2deg); opacity: 0.8; }
      }
      .animate-candle-flicker { animation: candle-flicker 0.2s ease-in-out infinite; }

      @keyframes rain {
        0% { background-position: 0% 0%; }
        100% { background-position: 20% 100%; }
      }
      .animate-rain { animation: rain 0.3s linear infinite; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-blink { animation: blink 1s step-end infinite; }

      @keyframes lightning {
        0%, 95%, 98% { opacity: 0; }
        96%, 99% { opacity: 1; }
      }
      .animate-lightning { animation: lightning 5s infinite; }

      @keyframes ripple {
        0% { transform: scale(0.5); opacity: 0.5; }
        100% { transform: scale(2.5); opacity: 0; }
      }
      .animate-ripple { animation: ripple 3s ease-out infinite; }

      @keyframes drift {
        0% { transform: translateX(-10%) translateY(0); }
        50% { transform: translateX(10%) translateY(-5px); }
        100% { transform: translateX(-10%) translateY(0); }
      }
      .animate-drift { animation: drift 15s ease-in-out infinite; }
    </style>

</script>

</head>

</html>
